name: Set up provider toolchain
description: Install the pinned Go toolchain and optional OpenTofu and Terraform CLIs

inputs:
  tofu-version:
    description: OpenTofu version to install, or empty to skip
    required: false
    default: ''
  terraform-version:
    description: Terraform version to install, or empty to skip
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: '1.26.5'
        check-latest: false
    - name: Set up OpenTofu
      if: inputs.tofu-version != ''
      uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
      with:
        tofu_version: ${{ inputs.tofu-version }}
        tofu_wrapper: false
    - name: Set up Terraform
      if: inputs.terraform-version != ''
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      with:
        terraform_version: ${{ inputs.terraform-version }}
        terraform_wrapper: false
