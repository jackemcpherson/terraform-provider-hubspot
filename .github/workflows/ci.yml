name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Deterministic check
    runs-on: ${{ vars.RUNNER_LABEL }}
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.26.5'
          check-latest: false
      - name: Install pinned developer tools
        run: make tools
      - name: Run aggregate gate
        run: make check
      - name: Verify generated documentation
        run: make docs && git diff --exit-code -- docs
      - name: Run engine smoke fixtures
        run: make engine-smoke
