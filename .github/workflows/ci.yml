name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Deterministic check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.5'
          check-latest: false
      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: '1.12.3'
          tofu_wrapper: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false
      - name: Install pinned developer tools
        run: make tools
      - name: Run aggregate gate
        run: make check
      - name: Verify generated documentation
        run: make docs && git diff --exit-code -- docs

  engine:
    name: Engine / ${{ matrix.engine }} ${{ matrix.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - engine: tofu
            version: 1.8.8
          - engine: tofu
            version: 1.12.3
          - engine: terraform
            version: 1.8.5
          - engine: terraform
            version: 1.15.8
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      ENGINE: ${{ matrix.engine }}
      TOFU_EXPECTED_VERSION: ${{ matrix.version }}
      TERRAFORM_EXPECTED_VERSION: ${{ matrix.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.5'
      - if: matrix.engine == 'tofu'
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: ${{ matrix.version }}
          tofu_wrapper: false
      - if: matrix.engine == 'terraform'
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ matrix.version }}
          terraform_wrapper: false
      - run: ./scripts/engine-smoke.sh

  required:
    name: Required
    if: always()
    needs: [check, engine]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - env:
          CHECK_RESULT: ${{ needs.check.result }}
          ENGINE_RESULT: ${{ needs.engine.result }}
        run: test "$CHECK_RESULT" = success && test "$ENGINE_RESULT" = success
