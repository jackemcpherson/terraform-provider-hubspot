name: Verify release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Published Free-alpha v-prefixed SemVer
        required: true
        type: string

permissions: {}

concurrency:
  group: verify-release-${{ inputs.version }}
  cancel-in-progress: false
  queue: max

jobs:
  assets:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      GPG_PUBLIC_KEY: ${{ vars.GPG_PUBLIC_KEY }}
      VERSION: ${{ inputs.version }}
    steps:
      - name: Check out the immutable release tag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: refs/tags/${{ inputs.version }}
          persist-credentials: false
      - name: Download and verify immutable assets
        run: |
          gh release download "$VERSION" --dir release-assets
          ./scripts/verify-release-assets.sh release-assets "$GPG_PUBLIC_KEY"
      - name: Wait for both registry identities
        run: ./scripts/verify-registry-ingestion.sh "$VERSION"

  install:
    needs: assets
    name: Install / ${{ matrix.engine }} / ${{ matrix.address }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - engine: terraform
            address: registry.terraform.io/jackemcpherson/hubspot
          - engine: tofu
            address: registry.opentofu.org/jackemcpherson/hubspot
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      ENGINE: ${{ matrix.engine }}
      GH_TOKEN: ${{ github.token }}
      PROVIDER_ADDRESS: ${{ matrix.address }}
      VERSION: ${{ inputs.version }}
    steps:
      - name: Check out the immutable release tag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: refs/tags/${{ inputs.version }}
          persist-credentials: false
      - if: matrix.engine == 'tofu'
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: '1.12.3'
          tofu_wrapper: false
      - if: matrix.engine == 'terraform'
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false
      - name: Download GitHub archives and verify registry digest identity
        run: |
          gh release download "$VERSION" --dir release-assets --pattern '*.zip'
          ./scripts/verify-released-provider.sh "$ENGINE" "$PROVIDER_ADDRESS" "$VERSION" release-assets

  live:
    needs: install
    name: Live / ${{ matrix.case_id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - case_id: free_properties_tofu
            shard: free_properties
            engine: tofu
            address: registry.opentofu.org/jackemcpherson/hubspot
          - case_id: free_properties_terraform
            shard: free_properties
            engine: terraform
            address: registry.terraform.io/jackemcpherson/hubspot
    environment: ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: hubspot-account-${{ matrix.shard }}
      cancel-in-progress: false
      queue: max
    permissions:
      contents: read
    env:
      ENGINE: ${{ matrix.engine }}
      HUBSPOT_ACCEPTANCE_PREFIX: tf_acc_release_${{ github.run_id }}_${{ github.run_attempt }}_
      HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
      PROVIDER_ADDRESS: ${{ matrix.address }}
      SHARD: ${{ matrix.shard }}
      VERSION: ${{ inputs.version }}
    steps:
      - name: Check out the immutable release tag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: refs/tags/${{ inputs.version }}
          persist-credentials: false
      - if: matrix.engine == 'tofu'
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: '1.12.3'
          tofu_wrapper: false
      - if: matrix.engine == 'terraform'
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false
      - run: ./scripts/released-live-shard.sh "$SHARD" "$ENGINE" "$PROVIDER_ADDRESS" "$VERSION"

  state-migration:
    needs: install
    environment: free_properties
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: hubspot-account-free_properties
      cancel-in-progress: false
      queue: max
    permissions:
      contents: read
    env:
      HUBSPOT_ACCEPTANCE_PREFIX: tf_acc_migration_${{ github.run_id }}_${{ github.run_attempt }}_
      HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
      VERSION: ${{ inputs.version }}
    steps:
      - name: Check out the immutable release tag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: refs/tags/${{ inputs.version }}
          persist-credentials: false
      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: '1.12.3'
          tofu_wrapper: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false
      - run: ./scripts/verify-state-migration.sh "$VERSION"

  report:
    if: always()
    needs: [assets, install, live, state-migration]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    env:
      ASSET_RESULT: ${{ needs.assets.result }}
      INSTALL_RESULT: ${{ needs.install.result }}
      LIVE_RESULT: ${{ needs.live.result }}
      MIGRATION_RESULT: ${{ needs.state-migration.result }}
      VERSION: ${{ inputs.version }}
    steps:
      - run: |
          jq -n \
            --arg version "$VERSION" \
            --arg assets "$ASSET_RESULT" \
            --arg install "$INSTALL_RESULT" \
            --arg live "$LIVE_RESULT" \
            --arg migration "$MIGRATION_RESULT" \
            '{
              version:$version,
              surface:"free-alpha",
              assets:$assets,
              engines:[
                {engine:"terraform-1.15.8",address:"registry.terraform.io/jackemcpherson/hubspot",status:$install},
                {engine:"tofu-1.12.3",address:"registry.opentofu.org/jackemcpherson/hubspot",status:$install}
              ],
              capabilities:[
                {shard:"free_properties",engine:"terraform-1.15.8",status:$live},
                {shard:"free_properties",engine:"tofu-1.12.3",status:$live}
              ],
              state_migrations:[
                {from:"registry.terraform.io",to:"registry.opentofu.org",status:$migration},
                {from:"registry.opentofu.org",to:"registry.terraform.io",status:$migration}
              ]
            }' >release-report.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-report-${{ inputs.version }}
          path: release-report.json
          if-no-files-found: error
      - run: |
          test "$ASSET_RESULT" = success
          test "$INSTALL_RESULT" = success
          test "$LIVE_RESULT" = success
          test "$MIGRATION_RESULT" = success
