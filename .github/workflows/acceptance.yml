name: Acceptance

on:
  schedule:
    - cron: '41 4 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: acceptance-${{ github.ref }}
  cancel-in-progress: false
  queue: max

jobs:
  capability:
    name: Acceptance / ${{ matrix.shard }}
    strategy:
      fail-fast: false
      matrix:
        shard: [free_properties]
    environment: ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: hubspot-account-${{ matrix.shard }}
      cancel-in-progress: false
      queue: max
    permissions:
      contents: read
    env:
      CAPABILITY_SHARD: ${{ matrix.shard }}
      HUBSPOT_DEMO_SCRIPT: ${{ github.workspace }}/.release-demo/scripts/demo
      HUBSPOT_PROVIDER_REPO: ${{ github.workspace }}
      HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
      HUBSPOT_ACCEPTANCE_PREFIX: tf_acc_${{ github.run_id }}_${{ github.run_attempt }}_
    steps:
      - name: Check out trusted source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Check out exact Northstar demo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: jackemcpherson/terraform-hubspot-instance-demo
          ref: 20efda68e25d703f73fd48da63bf7d4f20bb260b
          path: .release-demo
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.5'
          check-latest: false
      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: '1.12.3'
          tofu_wrapper: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.8'
          terraform_wrapper: false
      - name: Run fail-closed capability shard
        run: ./scripts/one-portal-free-lifecycle.sh
      - name: Upload sanitized result
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: acceptance-${{ matrix.shard }}
          path: acceptance-report/${{ matrix.shard }}.json
          if-no-files-found: error

  janitor-report:
    if: github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        shard: [free_properties]
    environment: ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: hubspot-account-${{ matrix.shard }}
      cancel-in-progress: false
      queue: max
    permissions:
      contents: read
    env:
      HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
      SHARD: ${{ matrix.shard }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.5'
      - name: Report stale owned configuration without deleting it
        run: ./scripts/acceptance-cleanup.sh report "$SHARD"
