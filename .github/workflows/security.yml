name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 3 * * 1'

permissions: {}

jobs:
  source-scan:
    name: Source security scan
    runs-on: ${{ vars.RUNNER_LABEL }}
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.26.5'
          check-latest: false
      - name: Verify workflow policy
        run: make check-workflows
      - name: Verify modules
        run: go mod verify
