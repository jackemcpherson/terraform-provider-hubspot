name: Acceptance cleanup

on:
  workflow_dispatch:
    inputs:
      shard:
        description: Protected capability environment
        required: true
        type: choice
        options: [free_properties]
      prefix:
        description: Exact tf_acc_ prefix ending in underscore
        required: true
        type: string
      confirmation:
        description: Type delete-prefixed-configuration
        required: true
        type: string

permissions: {}

concurrency:
  group: acceptance-cleanup-${{ inputs.shard }}
  cancel-in-progress: false
  queue: max

jobs:
  cleanup:
    environment: ${{ inputs.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: hubspot-account-${{ inputs.shard }}
      cancel-in-progress: false
      queue: max
    permissions:
      contents: read
    env:
      HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
      SHARD: ${{ inputs.shard }}
      PREFIX: ${{ inputs.prefix }}
      CONFIRMATION: ${{ inputs.confirmation }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.26.5'
      - name: Delete exact owned prefix
        run: ./scripts/acceptance-cleanup.sh delete "$SHARD" "$PREFIX" "$CONFIRMATION"
